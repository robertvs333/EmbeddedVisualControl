camera_publisher:
  ros__parameters:
    sensor_id: 0
    width: 640
    height: 480
    fps: 10


encoder_node:
  ros__parameters:
    left_encoder_pin: 35
    right_encoder_pin: 12
    left_ticks_topic: /encoders/left_ticks
    right_ticks_topic: /encoders/right_ticks
    left_direction_topic: /motors/left_direction
    right_direction_topic: /motors/right_direction
    publish_rate_hz: 20.0

route_plotter:
  ros__parameters:
    left_ticks_topic: /encoders/left_ticks
    right_ticks_topic: /encoders/right_ticks
    left_direction_topic: /motors/left_direction
    right_direction_topic: /motors/right_direction
    imu_yaw_topic: /imu/yaw
    heading_source: fused
    imu_heading_weight: 0.9
    path_topic: /route/path
    odom_topic: /route/odom
    frame_id: odom
    child_frame_id: base_link
    wheel_radius: 0.0325
    wheel_base: 0.19
    ticks_per_rev: 140.0
    initial_x: 0.0
    initial_y: 0.0
    initial_theta: -1.5708
    ticks_are_signed: true
    save_plot_on_shutdown: true
    plot_output_path: route_plot.png
    save_route_log_on_shutdown: true
    route_log_output_path: route_log.csv
    show_live_plot: true
    update_rate_hz: 20.0
    undefined_object_margin: 0.05
    save_simplified_route_on_shutdown: true
    simplified_plot_output_path: route_simplified.png
    simplified_route_log_output_path: route_simplified.csv
    loop_closure_distance: 0.05
    simplification_tolerance: 0.01

imu_node:
  ros__parameters:
    i2c_bus: 1
    device_address: 104
    publish_rate_hz: 20.0
    calibration_samples: 400
    frame_id: imu_link
    imu_topic: /imu/data_raw
    yaw_topic: /imu/yaw
    gyro_deadband_deg_s: 0.15


grid_mapping_node:
  ros__parameters:
    cell_size_m: 0.05
    room_width_m: 2.0
    room_height_m: 2.0
    start_in_center: true
    origin_x_m: 0.0
    origin_y_m: 0.0
    odom_topic: /route/odom
    tof_topic: /tof/distance
    detection_result_topic: /detection/final_result
    grid_topic: /mapping/semantic_grid
    tof_detection_threshold_m: 0.5
    duplicate_object_distance_m: 0.10
    sensor_forward_sign: -1.0
    save_grid_on_shutdown: true
    grid_csv_output_path: semantic_grid.csv
    grid_plot_output_path: semantic_grid.png
    show_live_grid: true
    run_on_jetson: true
    mark_raw_tof_as_unidentified: false
    detection_angle_sign: 1.0